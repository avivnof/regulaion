    function startOfDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function startOfWeekSunday(date) {
      const day = date.getDay();
      const base = startOfDay(date);
      base.setDate(base.getDate() - day);
      return base;
    }

    function formatHebrewDateTime(isoString) {
      const date = new Date(isoString);
      if (Number.isNaN(date.getTime())) return '';

      return date.toLocaleString('he-IL', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function getCurrentDurationText() {
      if (!currentAudio) return '';

      const rounded = formatRoundedAudioDuration(currentAudio.duration);

      const probed = formatRoundedAudioDuration(Number(currentAudio.dataset.probedDuration || 0));

      return getFallbackDurationText(currentAudio) || '';

    function updatePracticeStats() {
      const log = getPracticeLog();
      const now = new Date();
      const weekStart = startOfWeekSunday(now);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

      const weekCount = log.filter(item => new Date(item.completedAt) >= weekStart).length;
      const monthCount = log.filter(item => new Date(item.completedAt) >= monthStart).length;

      if (practiceTotal) practiceTotal.textContent = String(log.length);
      if (practiceMiniCount) practiceMiniCount.textContent = String(log.length);
      if (practiceWeek) practiceWeek.textContent = String(weekCount);
      if (practiceMonth) practiceMonth.textContent = String(monthCount);
    }

    function buildPracticeReportText(log = getPracticeLog()) {
      const lines = [];
      lines.push('דוח תרגולים אישי');
      lines.push('');
      lines.push(`סה״כ תרגולים: ${log.length}`);
      lines.push('');

      if (!log.length) {
        lines.push('עדיין לא נשמרו תרגולים במכשיר זה.');
        return lines.join('\n');
      }

      log.slice().reverse().forEach((item, index) => {
        const dateText = formatHebrewDateTime(item.completedAt);
        const duration = item.durationText ? ` — ${item.durationText}` : '';
        lines.push(`${index + 1}. ${dateText} — ${item.title}${duration}`);
      });

      return lines.join('\n');
    }

    function renderPracticeReport() {
      if (!practiceReportContent) return;

      const log = getPracticeLog();

      if (!log.length) {
        practiceReportContent.innerHTML = '<div class="practice-report-empty">עדיין לא נשמרו תרגולים במכשיר זה.</div>';
        return;
      }

      const items = log.slice().reverse().map(item => {
        const dateText = escapeHtml(formatHebrewDateTime(item.completedAt));
        const title = escapeHtml(item.title || 'תרגול');
        const duration = item.durationText ? ` — ${escapeHtml(item.durationText)}` : '';

        return `<li>${dateText} — ${title}${duration}</li>`;
      }).join('');

      practiceReportContent.innerHTML = `<ol class="practice-report-list">${items}</ol>`;
    }

    function togglePracticeReport() {
      if (!practiceReport) return;

      renderPracticeReport();
      practiceReport.classList.toggle('active');


      if (openPracticeCounter) {
        openPracticeCounter.addEventListener('click', openPracticeFloatingBox);
      }

      if (closePracticeCounter) {
        closePracticeCounter.addEventListener('click', closePracticeFloatingBox);
      }

      if (practiceFloatingBackdrop) {
        practiceFloatingBackdrop.addEventListener('click', closePracticeFloatingBox);
      }

      if (showPracticeReport) {
        showPracticeReport.textContent = practiceReport.classList.contains('active') ? 'הסתר דוח' : 'הצג דוח';
      }
    }

    function showPracticeToast(text = 'התרגול נוסף לדוח') {

      practiceToast.classList.add('active');

      window.setTimeout(() => {
        practiceToast.classList.remove('active');
      }, 1800);
    }

    function recordCompletedPractice() {
      if (!currentTitle) return;

      const log = getPracticeLog();

      log.push({
        completedAt: new Date().toISOString(),
        title: currentTitle,
        trackId: currentTrackId || '',
        durationText: getCurrentDurationText(),
        appVersion: APP_VERSION

      savePracticeLog(log);
      updatePracticeStats();

      if (practiceReport && practiceReport.classList.contains('active')) {
        renderPracticeReport();
      }

      showPracticeToast();
    }

    function downloadPracticeReportTxt() {
      const text = buildPracticeReportText();
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const date = new Date().toISOString().slice(0, 10);
      const link = document.createElement('a');

      link.href = url;
      link.download = `practice-report-${date}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();

      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

        resetPracticeCounter.addEventListener('click', resetPracticeLog);
      }
    }

    const FALLBACK_DURATION_MINUTES = {
      mindfulness: 9,
      'progressive-muscle-relaxation': 12,
      'diaphragmatic-breathing': 7,
      'diaphragmatic-breathing-holds': 7,
      'short-relaxation': 4,
      'thin-smoke': 5
    };

    function formatDurationMinutes(minutes) {
      const value = Number(minutes);
      if (!Number.isFinite(value) || value <= 0) return '';

      const rounded = Math.max(1, Math.round(value));

      if (rounded === 1) return 'כדקה';

      return `כ־${rounded} דקות`;
    }

    function formatRoundedAudioDuration(seconds) {
      if (!Number.isFinite(seconds) || seconds <= 0) return '';

      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = Math.round(seconds - (minutes * 60));
      const roundedMinutes = remainingSeconds > 30 ? minutes + 1 : minutes;

      if (roundedMinutes <= 0) return 'פחות מדקה';
      if (roundedMinutes === 1) return 'כדקה';

      return `כ־${roundedMinutes} דקות`;
    }

    function setDurationPillText(audio, text, loading = false) {
      if (!audio) return;

      const pill = document.getElementById(`duration-${audio.id}`);
      if (!pill) return;

      pill.textContent = text ? `משך: ${text}` : 'משך';
      pill.classList.toggle('loading-duration', Boolean(loading));
    }

    function getFallbackDurationText(audio) {
      const trackId = audio ? audio.dataset.trackId : '';
      const fallbackMinutes = FALLBACK_DURATION_MINUTES[trackId];

      return formatDurationMinutes(fallbackMinutes);
    }

    function updateDurationPill(audio) {
      if (!audio) return;

      const probedDuration = Number(audio.dataset.probedDuration || 0);
      const metadataDuration = formatRoundedAudioDuration(audio.duration);
      const probeDuration = formatRoundedAudioDuration(probedDuration);

      if (metadataDuration) {
        setDurationPillText(audio, metadataDuration, false);
        return;
      }

      if (probeDuration) {
        setDurationPillText(audio, probeDuration, false);
        return;
      }

      const fallback = getFallbackDurationText(audio);

      if (fallback) {
        setDurationPillText(audio, fallback, false);
      } else {
        setDurationPillText(audio, '', false);
      }
    }

    function loadAudioDurationWithProbe(audio) {
      if (!audio || audio.dataset.durationProbeStarted === 'true') return;

      audio.dataset.durationProbeStarted = 'true';

      const probe = new Audio();
      probe.preload = 'metadata';
      probe.src = audio.currentSrc || audio.src;

      probe.addEventListener('loadedmetadata', () => {
        if (Number.isFinite(probe.duration) && probe.duration > 0) {
          audio.dataset.probedDuration = String(probe.duration);
          const rounded = formatRoundedAudioDuration(probe.duration);
          if (rounded) setDurationPillText(audio, rounded, false);
        } else {
          updateDurationPill(audio);
        }
      }, { once: true });

      probe.addEventListener('error', () => {
        updateDurationPill(audio);
      }, { once: true });

      window.setTimeout(() => {
        updateDurationPill(audio);
      }, 1200);

      try {
        probe.load();
      } catch (error) {
        updateDurationPill(audio);
      }
    }

    (function(){
      const breathingIntroTrack = {
        id: 'diaphragmatic-breathing-intro',
        title: 'הקנייה (מתחילים)',
        subtitle: 'מתחילים',
        description: '',
        audio: 'audio/diaphragmatic-breathing-intro.mp3',
        duration: 'משך: מחשב...',
        available: true
      };

      const breathingPracticeTrack = {
        id: 'diaphragmatic-breathing-practice',
        title: 'תרגול',
        subtitle: 'מתקדמים',
        description: '',
        audio: 'audio/diaphragmatic-breathing-practice.mp3',
        duration: 'משך: מחשב...',
        available: true
      };

      function escapeBreathingHtml(value){
        return String(value ?? '')
          .replaceAll('&','&amp;')
          .replaceAll('<','&lt;')
          .replaceAll('>','&gt;')
          .replaceAll('"','&quot;')
          .replaceAll("'","&#039;");
      }

      function findBreathingCard(){
        const cards = [...document.querySelectorAll('.card')];
        return cards.find(card => {
          const text = card.textContent || '';
          const id = card.dataset ? (card.dataset.trackId || card.dataset.id || '') : '';
          return id === 'diaphragmatic-breathing' ||
                 text.includes('נשימה סרעפתית') ||
                 text.includes('נשימות סרעפתיות');
        });
      }

      function playBreathingTrack(track){
        const displayTitle = `הרפיית נשימה סרעפתית — ${track.title}`;
        const audioId = `audio-${track.id}`;
        let audio = document.getElementById(audioId);

        if(!audio){
          audio = document.createElement('audio');
          audio.id = audioId;
          audio.preload = 'auto';
          audio.playsInline = true;
          audio.src = track.audio;
          audio.dataset.available = 'true';
          audio.dataset.configStatus = 'ready';
          audio.dataset.trackId = track.id;
          audio.style.display = 'none';
          document.body.appendChild(audio);

          if(!audios.includes(audio)) audios.push(audio);

          audio.addEventListener('loadedmetadata',()=>{
            if(currentAudio===audio){
              updateTimerDisplay();
              updateProgressDisplay();
            }
          });

          audio.addEventListener('timeupdate',()=>{
            if(currentAudio===audio){
              updateTimerDisplay();
              updateCueDisplay();
            }
          });

          audio.addEventListener('ended',()=>{
            audio.volume=1;
            audio.muted=false;
            clearCountdown();
            if(currentAudio===audio){
              currentAudio=null;
              currentTitle='';
              currentTrackId='';
            }
            waitingForManualStart=false;
            countdownAudioPrimed=false;
            showEndScreen();
          });

          audio.load();
        }

        audio.dataset.available='true';

        if(waitingForManualStart && currentAudio===audio){
          resumeAudio(audio,displayTitle,track.id);
          return;
        }

        if(audio.paused){
          const isResume=currentAudio===audio && audio.currentTime>0 && !countdownActive;
          if(isResume){
            resumeAudio(audio,displayTitle,track.id);
          }else{
            // זהה לשאר ההרפיות: קודם פותחים את מסך הנגן והספירה, ורק אחר כך מתחילה ההשמעה.
            startAudioWithCountdown(audio,displayTitle,track.id);
          }
        }else{
          currentAudio=audio;
          currentTitle=displayTitle;
          currentTrackId=track.id;
          pauseCurrent();
        }
      }

      function makeHalf(track){
        const half = document.createElement('div');
        half.className = 'breathing-half';
        half.tabIndex = 0;
        half.setAttribute('role','button');
        half.setAttribute('aria-label', track.title);
        half.innerHTML = `
          <div>
            <h3>${escapeBreathingHtml(track.title)}</h3>
            <p>${escapeBreathingHtml(track.description)}</p>
          </div>
          <div>
            <button class="split-play-button" type="button">▶︎ נגן</button>
            <span class="status">${escapeBreathingHtml(track.subtitle)}</span>
          </div>
        `;
        half.addEventListener('click', () => playBreathingTrack(track));
        half.addEventListener('keydown', event => {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            playBreathingTrack(track);
          }
        });
        return half;
      }

      function splitBreathingCard(){
        const card = findBreathingCard();
        if (!card || card.classList.contains('breathing-split-card')) return;

        card.classList.add('breathing-split-card');
        card.setAttribute('aria-label', 'נשימה סרעפתית - בחירה בין הקנייה לתרגול');
        card.innerHTML = `
          <div class="breathing-split-header">
            <div class="icon-box">🌬️</div>
            <div>
              <h3 class="breathing-split-title">הרפיית נשימה סרעפתית</h3>
              
            </div>
          </div>
          <div class="breathing-split-options"></div>
        `;

        const options = card.querySelector('.breathing-split-options');
        options.appendChild(makeHalf(breathingIntroTrack));
        options.appendChild(makeHalf(breathingPracticeTrack));
      }

      const observer = new MutationObserver(splitBreathingCard);
      observer.observe(document.body, { childList: true, subtree: true });
      window.addEventListener('load', splitBreathingCard);
      setTimeout(splitBreathingCard, 100);
      setTimeout(splitBreathingCard, 600);
    })();

  </script>
