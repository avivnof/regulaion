    .countdown-overlay{position:absolute;inset:0;z-index:180;display:none;align-items:center;justify-content:center;pointer-events:none}.countdown-overlay.active{display:flex}.countdown-card{width:min(82vw,410px);padding:17px 18px 26px;border-radius:34px;background:radial-gradient(circle at 50% 20%,rgba(255,255,255,.98),rgba(234,249,251,.9)),rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.88);box-shadow:0 24px 54px rgba(31,92,120,.26),inset 0 1px 0 rgba(255,255,255,.86);backdrop-filter:blur(14px);text-align:center;color:#163746;direction:rtl}.countdown-image{width:100%;aspect-ratio:16/10;object-fit:cover;object-position:center;display:block;border-radius:24px;box-shadow:0 14px 34px rgba(31,92,120,.18);margin:0 auto 15px;background:rgba(255,255,255,.55)}.countdown-text{font-size:clamp(1.32rem,3.3vw,1.82rem);font-weight:900;margin-bottom:8px;color:#335765}.countdown-number{font-size:clamp(4.2rem,13vw,7.2rem);line-height:1;font-weight:900;color:#245466;text-shadow:0 8px 24px rgba(31,92,120,.16);direction:ltr;opacity:1;transform:scale(1);filter:blur(0);transition:opacity .42s ease,transform .42s ease,filter .42s ease}.countdown-number.dissolve-out{opacity:0;transform:scale(.92);filter:blur(6px)}.countdown-number.dissolve-in{opacity:1;transform:scale(1);filter:blur(0)}.cue-stage{position:relative;z-index:4;width:100%;height:100%;min-height:0;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(8px) scale(.985);filter:blur(8px);transition:opacity 1.15s ease,transform 1.15s ease,filter 1.15s ease;will-change:opacity,transform,filter;pointer-events:none;overflow:hidden;flex:1 1 auto}.cue-stage.active{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}.cue-stage.leaving{opacity:0;transform:translateY(-6px) scale(.985);filter:blur(8px)}.cue-content{width:100%;height:100%;min-height:0;overflow:hidden}.text-only-content,.image-only-content{width:94%;height:94%;margin:auto;display:flex;align-items:center;justify-content:center}.te     function resetBreathCircleAnimation(m){breathCircle.classList.remove('inhale','exhale');void breathCircle.offsetWidth;breathCircle.classList.add(m)}function renderBreathCoach(){if(breathPhaseMode==='inhale'){breathPhase.textContent='שאיפה דרך האף';breathInstruction.textContent='הבטן עולה קלות'}else{breathPhase.textContent='נשיפה דרך הפה';breathInstruction.textContent='הבטן יורדת'}breathCount.textContent=String(breathSecondsLeft);resetBreathCircleAnimation(breathPhaseMode)}function stopBreathCoach(){clearInterval(breathTimer);breathTimer=null;breathCoach.classList.remove('active');breathCircle.classList.remove('inhale','exhale')}function startBreathCoach(){stopBreathCoach();breathCoach.classList.add('active');breathPhaseMode='inhale';breathSecondsLeft=3;renderBreathCoach();breathTimer=setInterval(()=>{breathSecondsLeft-=1;if(breathSecondsLeft<=0){if(breathPhaseMode==='inhale'){breathPhaseMode='exhale';breathSecondsLeft=4}else{breathPhaseMode='inhale';breathSecondsLeft=3}renderBreathCoach()}else breathCount.textContent=String(breathSecondsLeft)},1000)}function updateBreathCoachForTitle(title){title==='הרפיית נשימה סרעפתית'&&!countdownActive?startBreathCoach():stopBreathCoach()}
    function setVisualizerControls(mode){if(mode==='countdown'){vizPlay.classList.add('hidden');vizPause.classList.add('hidden');vizStop.classList.remove('hidden');return}if(mode==='manual-start'){vizPlay.classList.remove('hidden');vizPause.classList.add('hidden');vizStop.classList.remove('hidden');return}if(mode==='paused'){vizPlay.classList.remove('hidden');vizPause.classList.add('hidden')}else{vizPlay.classList.add('hidden');vizPause.classList.remove('hidden')}vizStop.classList.remove('hidden')}function showVisualizer(title){bodyEl.classList.add('playing');visualizer.classList.add('active');vizCenter.textContent=title;vizPauseMessage.textContent='';vizPauseMessage.classList.remove('active');hideCountdownOverlay();setVisualizerControls('playing');updateBreathCoachForTitle(title);startTimerDisplay();updateCueDisplay();requestWakeLock()}function showCountdownVisualizer(title){bodyEl.classList.add('playing');visualizer.classList.add('active');vizCenter.textContent=title;vizTimer.textContent='00:00 / 00:00';vizPauseMessage.textContent='מיד מתחילים';vizPauseMessage.classList.add('active');stopBreathCoach();stopTimerDisplay(true);clearCueDisplay();resetProgressDisplay();setVisualizerControls('countdown');showCountdownOverlay(3);requestWakeLock()}function showManualStartVisualizer(title){bodyEl.classList.add('playing');visualizer.classList.add('active');vizCenter.textContent=title;vizPauseMessage.textContent='לחצו על ▶ להתחלה';vizPauseMessage.classList.add('active');hideCountdownOverlay();setVisualizerControls('manual-start');stopBreathCoach();stopTimerDisplay(true);clearCueDisplay();resetProgressDisplay();requestWakeLock()}function showPausedVisualizer(title){bodyEl.classList.add('playing');visualizer.classList.add('active');vizCenter.textContent=title;vizPauseMessage.textContent='השהייה — האם להמשיך?';vizPauseMessage.classList.add('active');hideCountdownOverlay();setVisualizerControls('paused');updateBreathCoachForTitle(title);clearInterval(breathTimer);breathTimer=null;stopTimerDisplay(false);updateTimerDisplay();updateCueDisplay();requestWakeLock()}function hideVisualizer(){bodyEl.classList.remove('playing');visualizer.classList.remove('active');vizCenter.textContent='לא מתנגן כעת';vizPauseMessage.textContent='';vizPauseMessage.classList.remove('active');clearCountdown();setVisualizerControls('playing');stopBreathCoach();stopTimerDisplay(true);clearCueDisplay();resetProgressDisplay();releaseWakeLock()}
    function stopOtherAudios(id){audios.forEach(a=>{if(a.id!==id){a.pause();a.currentTime=0;a.volume=1;a.muted=false;setIdle(a)}})}function primeAudioMutedForCountdown(a){countdownAudioPrimed=false;try{a.pause();a.currentTime=0;a.muted=true;a.volume=0;const p=a.play();if(p&&typeof p.then==='function')p.then(()=>{countdownAudioPrimed=true}).catch(()=>{countdownAudioPrimed=false});else countdownAudioPrimed=true}catch(e){countdownAudioPrimed=false}}function startPlaybackAfterCountdown(){if(!currentAudio)return;clearCountdown();try{currentAudio.currentTime=0}catch(e){}currentAudio.muted=false;currentAudio.volume=1;const btn=getButtonForAudio(currentAudio),st=getStatusForAudio(currentAudio);if(btn)btn.textContent='❚❚ עצור';if(st)st.textContent='מנגן';const p=currentAudio.play();if(p&&typeof p.then==='function')p.then(()=>{waitingForManualStart=false;showVisualizer(currentTitle)}).catch(()=>{waitingForManualStart=true;if(btn)btn.textContent='▶︎ התחל';if(st)st.textContent='לחצו להתחלה';showManualStartVisualizer(currentTitle)});else{waitingForManualStart=false;showVisualizer(currentTitle)}}function startCountdownSequence(){showCountdownOverlay(3);const a=setTimeout(()=>{if(countdownActive)dissolveCountdownTo(2)},COUNTDOWN_STEP_MS),b=setTimeout(()=>{if(countdownActive)dissolveCountdownTo(1)},COUNTDOWN_STEP_MS*2),c=setTimeout(()=>{if(countdownActive)startPlaybackAfterCountdown()},COUNTDOWN_STEP_MS*3);countdownTimeouts.push(a,b,c)}function startAudioWithCountdown(audio,title,trackId=''){const btn=getButtonForAudio(audio),st=getStatusForAudio(audio);if(audio.dataset.available!=='true'){if(st)st.textContent='בהכנה';return}stopOtherAudios(audio.id);clearCountdown();currentAudio=audio;currentTitle=title;currentTrackId=trackId||audio.dataset.trackId||'';waitingForManualStart=false;countdownActive=true;if(btn)btn.textContent='מתכונן...';if(st)st.textContent='מתחיל בעוד 3...';showCountdownVisualizer(title);primeAudioMutedForCountdown(currentAudio);startCountdownSequence()}function resumeAudio(audio,title,trackId=''){const btn=getButtonForAudio(audio),st=getStatusForAudio(audio);currentAudio=audio;currentTitle=title;currentTrackId=trackId||audio.dataset.trackId||'';countdownActive=false;waitingForManualStart=false;hideCountdownOverlay();if(audio.currentTime<=.05)try{audio.currentTime=0}catch(e){}audio.muted=false;audio.volume=1;const p=audio.play();if(p&&typeof p.then==='function')p.then(()=>{if(btn)btn.textContent='❚❚ עצור';if(st)st.textContent='מנגן';showVisualizer(title)}).catch(()=>{if(st)st.textContent='לא ניתן לנגן';stopCurrent()});else{if(btn)btn.textContent='❚❚ עצור';if(st)st.textContent='מנגן';showVisualizer(title)}}function pauseCurrent(){if(!currentAudio)return;clearCountdown();currentAudio.pause();currentAudio.muted=false;currentAudio.volume=1;const btn=getButtonForAudio(currentAudio),st=getStatusForAudio(currentAudio);if(btn)btn.textContent='▶︎ נגן';if(st)st.textContent='הושהה';showPausedVisualizer(currentTitle||'השהייה')}function stopCurrent(){clearCountdown();if(currentAudio){currentAudio.pause();currentAudio.currentTime=0;currentAudio.volume=1;currentAudio.muted=false;setIdle(currentAudio)}currentAudio=null;currentTitle='';currentTrackId='';waitingForManualStart=false;countdownAudioPrimed=false;hideVisualizer()}
    function bindProgressEvents(){progressRange.addEventListener('input',()=>{if(!currentAudio||countdownActive)return;isSeeking=true;const d=currentAudio.duration||0,v=Number(progressRange.value||0);if(Number.isFinite(d)&&d>0)progressCurrent.textContent=formatTime(v/1000*d)});['change','pointerup'].forEach(ev=>progressRange.addEventListener(ev,()=>{if(!currentAudio||countdownActive){isSeeking=false;return}const d=currentAudio.duration||0,v=Number(progressRange.value||0);if(Number.isFinite(d)&&d>0){currentAudio.currentTime=v/1000*d;updateTimerDisplay();updateCueDisplay()}isSeeking=false}));progressRange.addEventListener('pointerdown',()=>{if(!countdownActive)isSeeking=true})}
    
function bindCardClickEvents(){
  document.querySelectorAll('.card').forEach(card=>{
    const button=card.querySelector('.play');
    if(!button||button.disabled)return;
    card.addEventListener('click',event=>{
      if(event.target.closest('button,a,input,textarea,select'))return;
      button.click();
    });
    card.addEventListener('keydown',event=>{
      if(event.key==='Enter'||event.key===' '){
        event.preventDefault();
        button.click();
      }
    });
  });
}
function bindAudioEvents(){buttons=Array.from(document.querySelectorAll('.play'));audios=Array.from(document.querySelectorAll('audio'));audios.forEach(a=>{if(a.dataset.configStatus==='ready'){a.dataset.available='true';setIdle(a)}else markAudioPreparing(a);a.addEventListener('canplaythrough',()=>{markAudioReady(a);if(currentAudio===a)updateTimerDisplay()},{once:true});a.addEventListener('loadedmetadata',()=>{markAudioReady(a);if(currentAudio===a){updateTimerDisplay();updateProgressDisplay()}},{once:true});a.addEventListener('error',()=>markAudioPreparing(a));a.addEventListener('timeupdate',()=>{if(currentAudio===a){updateTimerDisplay();updateCueDisplay()}});a.load()});buttons.forEach(button=>{const audioId=button.dataset.audio,audio=document.getElementById(audioId),title=button.dataset.title,trackId=button.dataset.trackId||audio.dataset.trackId||'',st=document.getElementById(`status-${audioId}`);button.addEventListener('click',()=>{if(audio.dataset.available!=='true'){st.textContent='בהכנה';return}if(waitingForManualStart&&currentAudio===audio){resumeAudio(audio,title,trackId);return}if(audio.paused){const isResume=currentAudio===audio&&audio.currentTime>0&&!countdownActive;isResume?resumeAudio(audio,title,trackId):startAudioWithCountdown(audio,title,trackId)}else{currentAudio=audio;currentTitle=title;currentTrackId=trackId;pauseCurrent()}});audio.addEventListener('ended',()=>{button.textContent='▶︎ נגן';st.textContent='הסתיים';audio.volume=1;audio.muted=false;clearCountdown();if(currentAudio===audio){currentAudio=null;currentTitle='';currentTrackId=''}waitingForManualStart=false;countdownAudioPrimed=false;hideVisualizer()})})}
    vizPlay.addEventListener('click',()=>{if(currentAudio&&currentAudio.paused)resumeAudio(currentAudio,currentTitle,currentTrackId)});vizPause.addEventListener('click',pauseCurrent);vizStop.addEventListener('click',stopCurrent);vizClose.addEventListener('click',stopCurrent);bindProgressEvents();Promise.all([loadTracks(),loadCues()]).then(([tracks,cues])=>{cuesByTrack=cues||{};grid.innerHTML=tracks.map(trackToCard).join('');bindAudioEvents();bindCardClickEvents()});
  </script>
