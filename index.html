<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f9fb0" />
  <title>אתר ההרפיות | ד״ר אביב נוף</title>

  <style>
    :root {
      --ink: #1d3340;
      --muted: #647681;
      --teal: #4e9fb0;
      --deep: #314c5b;
      --cyan: #9fd5dd;
      --glass: rgba(255, 255, 255, 0.74);
      --line: rgba(79, 104, 117, 0.20);
      --shadow: 0 22px 55px rgba(48, 72, 86, 0.16);
      --soft-shadow: 0 10px 28px rgba(48, 72, 86, 0.12);
      --radius-xl: 34px;
      --radius-lg: 26px;
      --viz1: rgba(28, 90, 112, 0.98);
      --viz2: rgba(54, 135, 154, 0.92);
      --viz3: rgba(150, 218, 218, 0.82);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Noto Sans Hebrew", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 6%, rgba(125, 141, 159, 0.22), transparent 30%),
        radial-gradient(circle at 84% 10%, rgba(159, 213, 221, 0.34), transparent 32%),
        radial-gradient(circle at 70% 90%, rgba(200, 221, 221, 0.44), transparent 30%),
        linear-gradient(145deg, #eef3f4 0%, #f5f3f0 52%, #e8ecee 100%);
      overflow-x: hidden;
    }

    .shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 22px 16px 42px;
      transition: filter 260ms ease, opacity 260ms ease, transform 260ms ease;
    }

    body.playing .shell {
      filter: blur(3px) brightness(0.68) saturate(0.8);
      opacity: 0.78;
      transform: scale(0.995);
    }

    .hero {
      min-height: 330px;
      overflow: hidden;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.90), rgba(255,255,255,0.58)),
        linear-gradient(120deg, rgba(79,104,117,0.14), rgba(159,213,221,0.16));
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 26px 22px;
      display: grid;
      grid-template-columns: 0.92fr 1.18fr;
      gap: 22px;
      align-items: center;
    }

    .brand {
      text-align: center;
    }

    .logo-wrap {
      width: 142px;
      height: 142px;
      margin: 0 auto 14px;
      border-radius: 32px;
      padding: 10px;
      background: rgba(255,255,255,0.90);
      box-shadow: var(--soft-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-1deg);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 25px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.45rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      color: var(--deep);
    }

    .subtitle {
      margin: 12px 0 0;
      font-size: clamp(1.02rem, 2vw, 1.22rem);
      color: var(--muted);
      font-weight: 600;
    }

    .version-line {
      margin-top: 7px;
      color: #7a8a95;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .version-line span {
      font-weight: 600;
      opacity: 0.9;
    }

    .hero-art {
      min-height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scene-card {
      width: min(100%, 336px);
      border-radius: 32px;
      padding: 10px;
      background: linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.56));
      border: 1px solid rgba(255,255,255,0.76);
      box-shadow: 0 24px 64px rgba(48, 72, 86, 0.18);
      overflow: hidden;
    }

    .scene-card img {
      width: 100%;
      display: block;
      border-radius: 24px;
      object-fit: cover;
      aspect-ratio: 16 / 10;
      object-position: center;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin: 30px 4px 18px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      color: var(--deep);
    }

    .section-head span {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .card {
      position: relative;
      min-height: 214px;
      border-radius: var(--radius-lg);
      padding: 18px;
      overflow: hidden;
      background: var(--glass);
      border: 1px solid rgba(255,255,255,0.74);
      box-shadow: var(--soft-shadow);
      backdrop-filter: blur(18px);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 18px 42px rgba(48,72,86,0.17);
      border-color: rgba(159,213,221,0.68);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 16px;
    }

    .icon-box {
      width: 62px;
      height: 62px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.55)),
        linear-gradient(135deg, rgba(79,159,176,0.20), rgba(125,141,159,0.18));
      box-shadow: 0 9px 20px rgba(48,72,86,0.11);
      display: grid;
      place-items: center;
      font-size: 1.9rem;
      flex: 0 0 auto;
    }

    .card h3 {
      margin: 0;
      font-size: 1.12rem;
      line-height: 1.35;
      color: var(--ink);
    }

    .card p {
      margin: 0 0 16px;
      min-height: 44px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.95rem;
    }

    .play-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: auto;
    }

    .play {
      border: 0;
      cursor: pointer;
      color: white;
      min-width: 132px;
      border-radius: 999px;
      padding: 12px 17px;
      font-size: 0.96rem;
      font-weight: 800;
      background: linear-gradient(135deg, #4e9fb0, #6f7f8f);
      box-shadow: 0 12px 24px rgba(79,159,176,0.23);
      transition: transform 160ms ease, filter 160ms ease;
    }

    .play:hover {
      transform: translateY(-1px);
      filter: saturate(1.08);
    }

    .play.disabled,
    .play:disabled {
      opacity: 0.54;
      cursor: not-allowed;
      filter: grayscale(0.35);
      transform: none;
    }

    .status {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      line-height: 1.35;
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
    }

    .status small {
      font-size: 0.72rem;
      color: #7a8a95;
      font-weight: 600;
    }

    audio {
      display: none;
    }

    .disclaimer {
      margin-top: 24px;
      border-radius: 24px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(255,255,255,0.70);
      box-shadow: var(--soft-shadow);
      padding: 14px 18px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.90rem;
      backdrop-filter: blur(16px);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .visualizer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .visualizer.active {
      display: flex;
      pointer-events: auto;
    }

    .viz-backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04), rgba(20,34,42,0.20) 40%, rgba(18,30,38,0.38) 100%);
      backdrop-filter: blur(1px);
    }

    .viz-droplets {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .drop {
      position: absolute;
      top: -12%;
      width: 10px;
      height: 26px;
      background: linear-gradient(180deg, rgba(214,233,236,0.15), rgba(181, 213, 220, 0.72));
      border-radius: 50% 50% 60% 60%;
      box-shadow: 0 0 12px rgba(181,213,220,0.22);
      opacity: 0.7;
      animation: rainFall linear infinite;
    }

    .d1 { left: 44%; animation-duration: 5.4s; animation-delay: -0.8s; }
    .d2 { left: 49%; animation-duration: 6s; animation-delay: -2.2s; height: 20px; width: 8px; }
    .d3 { left: 54%; animation-duration: 5.8s; animation-delay: -1.4s; }
    .d4 { left: 41%; animation-duration: 6.4s; animation-delay: -3.1s; height: 18px; width: 7px; }
    .d5 { left: 57%; animation-duration: 6.2s; animation-delay: -2.5s; height: 16px; width: 7px; }

    .viz-core {
      position: relative;
      width: min(86vw, 620px);
      height: min(86vw, 620px);
      min-width: 310px;
      min-height: 310px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 28px rgba(35, 52, 62, 0.22));
      pointer-events: auto;
    }

    .viz-close {
      position: absolute;
      top: 50%;
      left: -14px;
      transform: translate(-50%, -50%);
      z-index: 120;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.82);
      background: rgba(255,255,255,0.92);
      color: #173846;
      box-shadow: 0 10px 26px rgba(31, 92, 120, 0.26);
      font-size: 1.15rem;
      font-weight: 900;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      backdrop-filter: blur(12px);
      transition: transform .18s ease, background .18s ease;
    }

    .viz-close:hover {
      transform: translate(-50%, -50%) scale(1.08);
      background: rgba(255,255,255,0.98);
    }

    .viz-ring {
      position: absolute;
      border-radius: 50%;
      border-style: solid;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      pointer-events: none;
    }

    .viz-ring.r1 {
      inset: 0;
      border-width: 6px;
      border-color: var(--viz1) transparent var(--viz2) transparent;
      animation-name: spinSlow;
      animation-duration: 12s;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.08) inset;
    }

    .viz-ring.r2 {
      inset: 20px;
      border-width: 5px;
      border-color: transparent var(--viz2) transparent var(--viz3);
      animation-name: spinReverse;
      animation-duration: 10s;
    }

    .viz-ring.r3 {
      inset: 44px;
      border-width: 4px;
      border-color: var(--viz3) transparent var(--viz1) transparent;
      animation-name: pulseSpin;
      animation-duration: 8.5s;
    }

    .viz-ring.r4 {
      inset: 70px;
      border-width: 3px;
      border-color: transparent rgba(59, 84, 98, 0.88) transparent rgba(110,129,140,0.7);
      animation-name: spinReverse;
      animation-duration: 7.5s;
    }

    .viz-wave,
    .viz-wave::before,
    .viz-wave::after {
      position: absolute;
      content: "";
      width: 78%;
      height: 36%;
      border: 4px solid rgba(53, 74, 87, 0.56);
      border-color: rgba(53, 74, 87, 0.56) transparent transparent transparent;
      border-radius: 50%;
      left: 11%;
      top: 31%;
      pointer-events: none;
    }

    .viz-wave {
      transform: rotate(-8deg);
      animation: waveDrift 4.8s ease-in-out infinite;
    }

    .viz-wave::before {
      top: 24px;
      left: -2px;
      transform: scale(0.9);
      opacity: 0.9;
      animation: waveDrift 5.6s ease-in-out infinite reverse;
    }

    .viz-wave::after {
      top: 48px;
      left: 2px;
      transform: scale(0.76);
      opacity: 0.82;
      animation: waveDrift 6.2s ease-in-out infinite;
    }

    .viz-center {
      position: relative;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 40%, rgba(238,255,255,0.92), rgba(151, 229, 226, 0.74) 44%, rgba(74, 166, 184, 0.62) 100%),
        linear-gradient(135deg, #b9f0ed, #65c5cf, #2b7898, #b0ebe7);
      background-size: 280% 280%;
      animation: slowTurquoiseGradient 42s ease-in-out infinite;
      box-shadow: 0 16px 44px rgba(31,92,120,0.30);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 14px 12px 16px;
      color: var(--deep);
      font-weight: 700;
      line-height: 1.4;
      font-size: clamp(1rem, 2.4vw, 1.25rem);
      gap: 9px;
      z-index: 5;
    }

    .viz-title {
      max-width: 90%;
      font-weight: 900;
    }

    .viz-timer {
      color: #3f5968;
      font-size: clamp(0.78rem, 1.7vw, 0.95rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      direction: ltr;
      opacity: 0.92;
    }

    .cue-display {
      width: 90%;
      min-height: 5.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      color: #163746;
      font-size: clamp(1.34rem, 5vw, 1.86rem);
      font-weight: 900;
      line-height: 1.42;
      text-align: center;
      text-wrap: balance;
      opacity: 0;
      transform: translateY(8px) scale(0.985);
      filter: blur(8px);
      transition:
        opacity 1.15s ease,
        transform 1.15s ease,
        filter 1.15s ease;
      will-change: opacity, transform, filter;
      pointer-events: none;
    }

    .cue-display.active {
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .cue-display.leaving {
      opacity: 0;
      transform: translateY(-6px) scale(0.985);
      filter: blur(8px);
    }

    .viz-pause-message {
      min-height: 1.2em;
      color: #5d7280;
      font-size: 0.92rem;
      font-weight: 800;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .viz-pause-message.active {
      opacity: 1;
      transform: translateY(0);
    }

    .viz-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    .viz-btn {
      width: 61px;
      height: 61px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.82);
      color: var(--deep);
      box-shadow: 0 8px 20px rgba(48,72,86,0.14);
      cursor: pointer;
      font-size: 1.34rem;
      font-weight: 900;
      transition: transform 160ms ease, background 160ms ease;
    }

    .viz-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.98);
    }

    .hidden {
      display: none !important;
    }

    .breath-coach {
      display: none;
      width: 90%;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 7px;
    }

    .breath-coach.active {
      display: flex;
    }

    .breath-phase {
      color: var(--deep);
      font-size: 1.02rem;
      font-weight: 900;
    }

    .breath-instruction {
      color: #627783;
      font-size: 0.82rem;
      font-weight: 800;
    }

    .breath-circle {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.96), rgba(145,220,224,0.58));
      border: 2px solid rgba(255,255,255,0.76);
      display: grid;
      place-items: center;
      box-shadow: 0 10px 24px rgba(31,92,120,0.14);
    }

    .breath-circle.inhale {
      animation: breatheIn 3s ease-in-out forwards;
    }

    .breath-circle.exhale {
      animation: breatheOut 4s ease-in-out forwards;
    }

    .breath-count {
      font-size: 1.55rem;
      font-weight: 900;
      color: #314c5b;
      direction: ltr;
    }

    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    @keyframes spinReverse {
      to { transform: rotate(-360deg); }
    }

    @keyframes pulseSpin {
      0% { transform: rotate(0deg) scale(0.98); opacity: 0.72; }
      50% { transform: rotate(180deg) scale(1.03); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.98); opacity: 0.72; }
    }

    @keyframes waveDrift {
      0%, 100% { transform: translateY(0) rotate(-8deg); }
      50% { transform: translateY(10px) rotate(-4deg); }
    }

    @keyframes rainFall {
      0% { transform: translateY(-10vh); opacity: 0; }
      18% { opacity: 0.72; }
      100% { transform: translateY(118vh); opacity: 0; }
    }

    @keyframes breatheIn {
      from { transform: scale(0.74); }
      to { transform: scale(1.12); }
    }

    @keyframes breatheOut {
      from { transform: scale(1.12); }
      to { transform: scale(0.74); }
    }

    @keyframes slowTurquoiseGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .hero-art {
        min-height: 160px;
      }

      .scene-card {
        width: min(100%, 312px);
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .section-head {
        align-items: start;
        flex-direction: column;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 12px 10px 28px;
      }

      .hero {
        padding: 22px 14px;
        border-radius: 28px;
      }

      .logo-wrap {
        width: 122px;
        height: 122px;
        border-radius: 28px;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card {
        min-height: 196px;
        padding: 16px;
        border-radius: 24px;
      }

      .play-row {
        flex-wrap: wrap;
      }

      .play {
        min-width: 122px;
      }

      .disclaimer {
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
      }

      .viz-core {
        width: min(94vw, 470px);
        height: min(94vw, 470px);
        min-width: 330px;
        min-height: 330px;
      }

      .viz-center {
        width: 78%;
        height: 78%;
        padding: 12px 10px;
      }

      .viz-close {
        left: 4px;
        width: 32px;
        height: 32px;
        font-size: 1.05rem;
      }

      .cue-display {
        width: 94%;
        min-height: 6em;
        font-size: clamp(1.36rem, 6vw, 1.78rem);
        line-height: 1.42;
      }

      .viz-btn {
        width: 54px;
        height: 54px;
        font-size: 1.18rem;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="hero">
      <div class="brand">
        <div class="logo-wrap">
          <img src="assets/nof-logo.jpg" alt="לוגו מכון נוף" />
        </div>

        <h1>אתר ההרפיות</h1>
        <div class="subtitle">ד״ר אביב נוף, פסיכולוג קליני</div>
        <div class="version-line">גרסה מס׳ 105 <span>(27.06.2026, 11:52)</span></div>
      </div>

      <div class="hero-art">
        <div class="scene-card">
          <img src="assets/breathing-scene.png" alt="איור נשימה והרפיה" />
        </div>
      </div>
    </section>

    <section class="section-head">
      <div>
        <h2>בחרו תרגול</h2>
        <span>האזנה מודרכת לתרגילי ויסות, נשימה והרפיה</span>
      </div>
    </section>

    <section class="grid" id="tracksGrid" aria-label="תרגילי ויסות והרפיה"></section>

    <section class="disclaimer">
      תרגילי האתר מיועדים לוויסות והרגעה, ואינם תחליף לייעוץ, אבחון או טיפול מקצועי.
    </section>
  </main>

  <div class="visualizer" id="visualizer" aria-hidden="true">
    <div class="viz-backdrop"></div>

    <div class="viz-droplets" aria-hidden="true">
      <span class="drop d1"></span>
      <span class="drop d2"></span>
      <span class="drop d3"></span>
      <span class="drop d4"></span>
      <span class="drop d5"></span>
    </div>

    <div class="viz-core">
      <button class="viz-close" id="vizClose" type="button" aria-label="סגור ועצור">×</button>

      <div class="viz-ring r1"></div>
      <div class="viz-ring r2"></div>
      <div class="viz-ring r3"></div>
      <div class="viz-ring r4"></div>
      <div class="viz-wave"></div>

      <div class="viz-center">
        <div class="viz-title" id="vizCenter">לא מתנגן כעת</div>
        <div class="viz-timer" id="vizTimer">00:00 / 00:00</div>
        <div class="cue-display" id="cueDisplay" aria-live="polite"></div>

        <div class="viz-pause-message" id="vizPauseMessage"></div>

        <div class="breath-coach" id="breathCoach">
          <div class="breath-phase" id="breathPhase">שאיפה דרך האף</div>
          <div class="breath-instruction" id="breathInstruction">הבטן עולה קלות</div>
          <div class="breath-circle" id="breathCircle">
            <div class="breath-count" id="breathCount">3</div>
          </div>
        </div>

        <div class="viz-controls">
          <button class="viz-btn hidden" id="vizPlay" type="button" aria-label="המשך">▶</button>
          <button class="viz-btn" id="vizPause" type="button" aria-label="השהה">❚❚</button>
          <button class="viz-btn" id="vizStop" type="button" aria-label="עצור">■</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const bodyEl = document.body;
    const grid = document.getElementById('tracksGrid');

    const visualizer = document.getElementById('visualizer');
    const vizCenter = document.getElementById('vizCenter');
    const vizPauseMessage = document.getElementById('vizPauseMessage');
    const vizTimer = document.getElementById('vizTimer');
    const cueDisplay = document.getElementById('cueDisplay');

    const breathCoach = document.getElementById('breathCoach');
    const breathPhase = document.getElementById('breathPhase');
    const breathInstruction = document.getElementById('breathInstruction');
    const breathCircle = document.getElementById('breathCircle');
    const breathCount = document.getElementById('breathCount');

    const vizPlay = document.getElementById('vizPlay');
    const vizPause = document.getElementById('vizPause');
    const vizStop = document.getElementById('vizStop');
    const vizClose = document.getElementById('vizClose');

    let buttons = [];
    let audios = [];
    let currentAudio = null;
    let currentTitle = '';
    let currentTrackId = '';

    let cuesByTrack = {};
    let activeCueKey = '';
    let cueTransitionTimer = null;
    let cueCheckInterval = null;

    let timerInterval = null;

    let breathTimer = null;
    let breathPhaseMode = 'inhale';
    let breathSecondsLeft = 3;

    const fallbackTracks = [
      {
        id: "progressive-muscle-relaxation",
        title: "הרפיית שרירים פרוגרסיבית",
        description: "הרפיה על שם ג'ייקובסון",
        icon: "〰️",
        audio: "audio/progressive-muscle-relaxation.mp3",
        updated: "27.06.2026, 08:52",
        status: "ready"
      },
      {
        id: "mindfulness",
        title: "תרגול מיינדפולנס",
        description: "תרגיל מיינדפולנס בהתבסס על המודולה של בארלו בפרוטוקול המאוחד",
        icon: "◌",
        audio: "audio/mindfulness.mp3",
        updated: "27.06.2026, 08:52",
        status: "ready"
      },
      {
        id: "diaphragmatic-breathing",
        title: "הרפיית נשימה סרעפתית",
        description: "נשימה שמעודדת קוהרנטיות של קצב הלב",
        icon: "🌬️",
        audio: "audio/diaphragmatic-breathing.mp3",
        updated: "טרם עודכן",
        status: "preparing"
      },
      {
        id: "diaphragmatic-breathing-holds",
        title: "נשימה סרעפתית עם עצירות",
        description: "הגברת זמינות הפחמן הדו-חמצני וקוהרנטיות קצב הלב",
        icon: "🫧",
        audio: "audio/diaphragmatic-breathing-holds.mp3",
        updated: "טרם הועלה קובץ",
        status: "preparing"
      },
      {
        id: "short-relaxation",
        title: "הרפיה מקוצרת",
        description: "תרגול קצר ועוצמתי.",
        icon: "⚡",
        audio: "audio/short-relaxation.mp3",
        updated: "טרם הועלה קובץ",
        status: "preparing"
      },
      {
        id: "thin-smoke",
        title: "עשן דק",
        description: "רצף פעולות להרפיה יעילה מבית מדרשו של פרופ' דני חמיאל",
        icon: "🌫️",
        audio: "audio/thin-smoke.mp3",
        updated: "טרם הועלה קובץ",
        status: "preparing"
      }
    ];

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function trackToCard(track, index) {
      const audioId = `audio-${index + 1}`;
      const statusId = `status-${audioId}`;
      const title = escapeHtml(track.title);
      const description = escapeHtml(track.description);
      const icon = escapeHtml(track.icon || '◌');
      const audio = escapeHtml(track.audio);
      const updated = escapeHtml(track.updated || 'טרם עודכן');
      const trackId = escapeHtml(track.id);

      return `
        <article class="card">
          <div class="card-top">
            <div class="icon-box">${icon}</div>
            <h3>${title}</h3>
          </div>

          <p>${description}</p>

          <div class="play-row">
            <button class="play" data-audio="${audioId}" data-title="${title}" data-track-id="${trackId}">▶︎ נגן</button>
            <span class="status" id="${statusId}">בהכנה <small>${updated}</small></span>
          </div>

          <audio id="${audioId}" src="${audio}" data-updated="${updated}" data-track-id="${trackId}"></audio>
        </article>
      `;
    }

    async function loadTracks() {
      try {
        const response = await fetch('assets/tracks.json?v=105', { cache: 'no-store' });
        if (!response.ok) throw new Error('tracks.json not found');
        const tracks = await response.json();
        return Array.isArray(tracks) && tracks.length ? tracks : fallbackTracks;
      } catch (error) {
        return fallbackTracks;
      }
    }

    async function loadCues() {
      try {
        const response = await fetch('assets/cues.json?v=105', { cache: 'no-store' });
        if (!response.ok) throw new Error('cues.json not found');
        const data = await response.json();
        return data && typeof data === 'object' ? data : {};
      } catch (error) {
        return {};
      }
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) return '00:00';
      const total = Math.floor(seconds);
      const minutes = Math.floor(total / 60);
      const secs = total % 60;
      return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    function parseCueTime(value) {
      if (!value || typeof value !== 'string') return 0;

      const parts = value.split(':').map(Number);

      if (parts.some(Number.isNaN)) return 0;
      if (parts.length === 2) return (parts[0] * 60) + parts[1];
      if (parts.length === 3) return (parts[0] * 3600) + (parts[1] * 60) + parts[2];

      return 0;
    }

    function getActiveCue(trackId, seconds) {
      const list = cuesByTrack[trackId] || [];

      return list.find(cue => {
        const start = parseCueTime(cue.start);
        const end = parseCueTime(cue.end);
        return seconds >= start && seconds < end;
      });
    }

    function cueKey(cue) {
      return cue ? `${cue.start}|${cue.end}|${cue.text}` : '';
    }

    function setCueTextWithDissolve(text, key) {
      if (!cueDisplay) return;

      clearTimeout(cueTransitionTimer);

      /*
        תיקון חשוב:
        מעדכנים את activeCueKey מיד, ולא רק אחרי הדיזולב.
        אחרת timeupdate של האודיו מפעיל שוב ושוב את אותו מעבר,
        והטקסט לא מספיק להופיע.
      */
      activeCueKey = key || '';

      cueDisplay.classList.add('leaving');
      cueDisplay.classList.remove('active');

      cueTransitionTimer = setTimeout(() => {
        cueDisplay.textContent = text || '';

        if (text) {
          cueDisplay.classList.remove('leaving');
          requestAnimationFrame(() => cueDisplay.classList.add('active'));
        } else {
          cueDisplay.classList.remove('leaving', 'active');
        }
      }, 520);
    }

    function updateCueDisplay() {
      if (!cueDisplay || !currentAudio || !currentTrackId) return;

      const cue = getActiveCue(currentTrackId, currentAudio.currentTime || 0);
      const nextKey = cueKey(cue);

      if (nextKey === activeCueKey) return;

      if (cue && cue.text) {
        setCueTextWithDissolve(cue.text, nextKey);
      } else {
        setCueTextWithDissolve('', '');
      }
    }

    function clearCueDisplay() {
      if (!cueDisplay) return;

      clearTimeout(cueTransitionTimer);
      activeCueKey = '';
      cueDisplay.textContent = '';
      cueDisplay.classList.remove('active', 'leaving');
    }

    function updateTimerDisplay() {
      if (!vizTimer || !currentAudio) return;

      const elapsed = currentAudio.currentTime || 0;
      const duration = currentAudio.duration || 0;

      vizTimer.textContent = `${formatTime(elapsed)} / ${formatTime(duration)}`;
      updateCueDisplay();
    }

    function startCueChecking() {
      stopCueChecking();
      updateCueDisplay();
      cueCheckInterval = setInterval(updateCueDisplay, 450);
    }

    function stopCueChecking() {
      clearInterval(cueCheckInterval);
      cueCheckInterval = null;
    }

    function startTimerDisplay() {
      stopTimerDisplay(false);
      updateTimerDisplay();
      timerInterval = setInterval(updateTimerDisplay, 1000);
      startCueChecking();
    }

    function stopTimerDisplay(clear = true) {
      clearInterval(timerInterval);
      timerInterval = null;
      stopCueChecking();

      if (clear && vizTimer) {
        vizTimer.textContent = '00:00 / 00:00';
      }
    }

    function setIdle(audio) {
      const btn = document.querySelector(`[data-audio="${audio.id}"]`);
      const status = document.getElementById(`status-${audio.id}`);
      const available = audio.dataset.available === 'true';
      const updated = audio.dataset.updated || 'טרם עודכן';

      if (btn) {
        btn.textContent = '▶︎ נגן';
        btn.disabled = !available;
        btn.classList.toggle('disabled', !available);
      }

      if (status) {
        if (available) {
          status.innerHTML = `מוכן <small>עודכן: ${updated}</small>`;
        } else {
          status.innerHTML = `בהכנה <small>${updated}</small>`;
        }
      }
    }

    function getButtonForAudio(audio) {
      return document.querySelector(`[data-audio="${audio.id}"]`);
    }

    function getStatusForAudio(audio) {
      return document.getElementById(`status-${audio.id}`);
    }

    function markAudioReady(audio) {
      audio.dataset.available = 'true';
      setIdle(audio);
    }

    function markAudioPreparing(audio) {
      audio.dataset.available = 'false';

      const btn = getButtonForAudio(audio);
      const status = getStatusForAudio(audio);
      const updated = audio.dataset.updated || 'טרם עודכן';

      if (btn) {
        btn.disabled = true;
        btn.classList.add('disabled');
      }

      if (status) {
        status.innerHTML = `בהכנה <small>${updated}</small>`;
      }
    }

    function resetBreathCircleAnimation(mode) {
      if (!breathCircle) return;

      breathCircle.classList.remove('inhale', 'exhale');
      void breathCircle.offsetWidth;
      breathCircle.classList.add(mode);
    }

    function renderBreathCoach() {
      if (!breathPhase || !breathInstruction || !breathCount) return;

      if (breathPhaseMode === 'inhale') {
        breathPhase.textContent = 'שאיפה דרך האף';
        breathInstruction.textContent = 'הבטן עולה קלות';
      } else {
        breathPhase.textContent = 'נשיפה דרך הפה';
        breathInstruction.textContent = 'הבטן יורדת';
      }

      breathCount.textContent = String(breathSecondsLeft);
      resetBreathCircleAnimation(breathPhaseMode);
    }

    function stopBreathCoach() {
      clearInterval(breathTimer);
      breathTimer = null;

      if (breathCoach) breathCoach.classList.remove('active');
      if (breathCircle) breathCircle.classList.remove('inhale', 'exhale');
    }

    function startBreathCoach() {
      stopBreathCoach();

      if (!breathCoach) return;

      breathCoach.classList.add('active');
      breathPhaseMode = 'inhale';
      breathSecondsLeft = 3;
      renderBreathCoach();

      breathTimer = setInterval(() => {
        breathSecondsLeft -= 1;

        if (breathSecondsLeft <= 0) {
          if (breathPhaseMode === 'inhale') {
            breathPhaseMode = 'exhale';
            breathSecondsLeft = 4;
          } else {
            breathPhaseMode = 'inhale';
            breathSecondsLeft = 3;
          }

          renderBreathCoach();
        } else if (breathCount) {
          breathCount.textContent = String(breathSecondsLeft);
        }
      }, 1000);
    }

    function updateBreathCoachForTitle(title) {
      if (title === 'הרפיית נשימה סרעפתית') {
        startBreathCoach();
      } else {
        stopBreathCoach();
      }
    }

    function setVisualizerControls(mode) {
      if (!vizPlay || !vizPause || !vizStop) return;

      if (mode === 'paused') {
        vizPlay.classList.remove('hidden');
        vizPause.classList.add('hidden');
      } else {
        vizPlay.classList.add('hidden');
        vizPause.classList.remove('hidden');
      }

      vizStop.classList.remove('hidden');
    }

    function showVisualizer(title) {
      bodyEl.classList.add('playing');

      if (visualizer) visualizer.classList.add('active');
      if (vizCenter) vizCenter.textContent = title;

      if (vizPauseMessage) {
        vizPauseMessage.textContent = '';
        vizPauseMessage.classList.remove('active');
      }

      setVisualizerControls('playing');
      updateBreathCoachForTitle(title);
      startTimerDisplay();
      updateCueDisplay();
    }

    function showPausedVisualizer(title) {
      bodyEl.classList.add('playing');

      if (visualizer) visualizer.classList.add('active');
      if (vizCenter) vizCenter.textContent = title;

      if (vizPauseMessage) {
        vizPauseMessage.textContent = 'השהייה — האם להמשיך?';
        vizPauseMessage.classList.add('active');
      }

      setVisualizerControls('paused');
      updateBreathCoachForTitle(title);

      clearInterval(breathTimer);
      breathTimer = null;

      stopTimerDisplay(false);
      updateTimerDisplay();
      updateCueDisplay();
    }

    function hideVisualizer() {
      bodyEl.classList.remove('playing');

      if (visualizer) visualizer.classList.remove('active');
      if (vizCenter) vizCenter.textContent = 'לא מתנגן כעת';

      if (vizPauseMessage) {
        vizPauseMessage.textContent = '';
        vizPauseMessage.classList.remove('active');
      }

      setVisualizerControls('playing');
      stopBreathCoach();
      stopTimerDisplay(true);
      clearCueDisplay();
    }

    function stopOtherAudios(currentId) {
      audios.forEach(audio => {
        if (audio.id !== currentId) {
          audio.pause();
          audio.currentTime = 0;
          setIdle(audio);
        }
      });
    }

    function playAudio(audio, title, trackId = '') {
      const btn = getButtonForAudio(audio);
      const status = getStatusForAudio(audio);

      if (audio.dataset.available !== 'true') {
        if (status) {
          status.innerHTML = `בהכנה <small>${audio.dataset.updated || 'טרם עודכן'}</small>`;
        }

        return;
      }

      stopOtherAudios(audio.id);

      currentAudio = audio;
      currentTitle = title;
      currentTrackId = trackId || audio.dataset.trackId || '';

      audio.play().then(() => {
        if (btn) btn.textContent = '❚❚ עצור';
        if (status) status.textContent = 'מנגן';

        showVisualizer(title);
      }).catch(() => {
        if (status) status.textContent = 'לא ניתן לנגן';
        hideVisualizer();
      });
    }

    function pauseCurrent() {
      if (!currentAudio) return;

      currentAudio.pause();

      const btn = getButtonForAudio(currentAudio);
      const status = getStatusForAudio(currentAudio);

      if (btn) btn.textContent = '▶︎ נגן';
      if (status) status.textContent = 'הושהה';

      showPausedVisualizer(currentTitle || 'השהייה');
    }

    function stopCurrent() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.currentTime = 0;
        setIdle(currentAudio);
      }

      currentAudio = null;
      currentTitle = '';
      currentTrackId = '';

      hideVisualizer();
    }

    function bindAudioEvents() {
      buttons = Array.from(document.querySelectorAll('.play'));
      audios = Array.from(document.querySelectorAll('audio'));

      audios.forEach(audio => {
        markAudioPreparing(audio);

        audio.addEventListener('canplaythrough', () => {
          markAudioReady(audio);

          if (currentAudio === audio) {
            updateTimerDisplay();
          }
        }, { once: true });

        audio.addEventListener('loadedmetadata', () => {
          markAudioReady(audio);

          if (currentAudio === audio) {
            updateTimerDisplay();
          }
        }, { once: true });

        audio.addEventListener('error', () => {
          markAudioPreparing(audio);
        });

        audio.addEventListener('timeupdate', () => {
          if (currentAudio === audio) {
            updateCueDisplay();
          }
        });

        audio.load();
      });

      buttons.forEach(button => {
        const audioId = button.dataset.audio;
        const audio = document.getElementById(audioId);
        const title = button.dataset.title;
        const trackId = button.dataset.trackId || audio.dataset.trackId || '';
        const status = document.getElementById(`status-${audioId}`);

        button.addEventListener('click', () => {
          if (audio.dataset.available !== 'true') {
            status.innerHTML = `בהכנה <small>${audio.dataset.updated || 'טרם עודכן'}</small>`;
            return;
          }

          if (audio.paused) {
            playAudio(audio, title, trackId);
          } else {
            currentAudio = audio;
            currentTitle = title;
            currentTrackId = trackId;

            audio.pause();

            button.textContent = '▶︎ נגן';
            status.textContent = 'הושהה';

            showPausedVisualizer(title);
          }
        });

        audio.addEventListener('ended', () => {
          button.textContent = '▶︎ נגן';
          status.textContent = 'הסתיים';

          if (currentAudio === audio) {
            currentAudio = null;
            currentTitle = '';
            currentTrackId = '';
          }

          hideVisualizer();
        });
      });
    }

    if (vizPlay) {
      vizPlay.addEventListener('click', () => {
        if (currentAudio && currentAudio.paused) {
          playAudio(currentAudio, currentTitle, currentTrackId);
        }
      });
    }

    if (vizPause) {
      vizPause.addEventListener('click', pauseCurrent);
    }

    if (vizStop) {
      vizStop.addEventListener('click', stopCurrent);
    }

    if (vizClose) {
      vizClose.addEventListener('click', stopCurrent);
    }

    Promise.all([loadTracks(), loadCues()]).then(([tracks, cues]) => {
      cuesByTrack = cues || {};
      grid.innerHTML = tracks.map(trackToCard).join('');
      bindAudioEvents();
    });
  </script>
</body>
</html>
