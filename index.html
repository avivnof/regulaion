    .shell {

      margin: 0 auto;

      transition: filter 260ms ease, opacity 260ms ease, transform 260ms ease;

    body.playing .shell {

      opacity: 0.78;
      transform: scale(0.995);
    }

      grid-template-columns: 0.92fr 1.18fr;
      gap: 22px;
      align-items: center;
    }

      border-radius: 32px;
      padding: 10px;
      background: rgba(255,255,255,0.90);
      box-shadow: var(--soft-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: rotate(-1deg);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 25px;
    }

      line-height: 1.05;

    .subtitle {

      font-size: clamp(1.02rem, 2vw, 1.22rem);
      color: var(--muted);
      font-weight: 600;
    }

      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .version-line span {

      opacity: 0.9;
    }

    .hero-art {

      display: flex;
      align-items: center;
      justify-content: center;

      overflow: hidden;
